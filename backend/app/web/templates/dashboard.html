{% extends "base.html" %}
{% block title %}Dashboard — Filtration{% endblock %}
{% block nav %}
<nav class="nav">
  <span class="nav-email">{{ user.email }}</span>
  <a class="nav-link" href="/auth/logout">Sign out</a>
</nav>
{% endblock %}
{% block content %}
<section class="scanbar">
  <form hx-post="/scan" hx-target="#results" hx-swap="innerHTML"
        hx-indicator="#spinner" hx-disabled-elt="find button">
    <label class="count">
      Scan the latest
      <input type="number" name="limit" value="25" min="1" max="200" step="1"
             inputmode="numeric" aria-label="Number of emails to scan" />
      emails
      <small class="muted">(1–200)</small>
    </label>
    <button class="btn btn-primary" type="submit">Scan inbox</button>
    <span id="spinner" class="htmx-indicator">Scanning…</span>
  </form>
</section>

<section id="results"
         hx-get="/results" hx-trigger="load" hx-swap="innerHTML">
  <p class="muted">Loading previous results…</p>
</section>
{% endblock %}
